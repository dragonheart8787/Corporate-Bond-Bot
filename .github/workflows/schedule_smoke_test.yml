# 極簡排程測試：若這個 workflow 也從未出現 Scheduled run，
# 代表整個 repo 的 GitHub「內建 cron」未生效（帳號/組織/設定），請改用 scripts/Trigger-GitHubDailyWorkflow.ps1
name: Schedule smoke test

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Echo UTC
        run: |
          echo "SMOKE_OK $(date -u -Iseconds)"
          echo "## Schedule smoke OK" >> "$GITHUB_STEP_SUMMARY"
          echo "- UTC: $(date -u)" >> "$GITHUB_STEP_SUMMARY"
