# 手動驗證 Actions 能否執行（不發 Telegram）。已關閉 cron，避免每 15 分鐘製造雜訊。
# 若要測 GitHub「內建 schedule」是否生效，請暫時在下方加回 schedule 或看 daily workflow 的每日 run。
name: Schedule smoke test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Echo UTC
        run: |
          echo "SMOKE_OK $(date -u -Iseconds)"
          echo "## Schedule smoke OK" >> "$GITHUB_STEP_SUMMARY"
          echo "- UTC: $(date -u)" >> "$GITHUB_STEP_SUMMARY"
