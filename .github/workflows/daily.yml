name: 每日公司債自動抓取與 Telegram 通知

# -----------------------------------------------------------------------------
# 若 Actions 列表裡「完全沒有 Scheduled」觸發（只有手動 Run）→ 幾乎一定是 GitHub 端未跑排程，請檢查：
# 1) 本 workflow 檔在「預設分支」（本 repo：master）。
# 2) Settings → Actions → General → Actions permissions 須允許執行 workflows。
# 3) 同上頁 Workflow permissions 建議選「Read and write」（要 push reports）。
# 4) 開 Actions → 左欄點本 workflow → 若出現排程已停用（disabled），按 Enable。
# 5) 倉庫長期無活動時 GitHub 會自動暫停 scheduled workflows；任意 push 或手動 Enable 可恢復。
# 6) 排程以 UTC 為準；推送後請等下一個 UTC :00 / :15 / :30 / :45 之後數分鐘再看是否有 run。
# 7) 備援：本 workflow 已支援 repository_dispatch（event_type=daily-run）。可建 Fine-grained token
#    （Contents+Actions 讀寫）後，用外部 cron 每 15 分鐘 POST：
#    curl -L -X POST -H "Accept: application/vnd.github+json" -H "Authorization: Bearer TOKEN" \
#      https://api.github.com/repos/dragonheart8787/Corporate-Bond-Bot/dispatches \
#      -d '{"event_type":"daily-run"}'
# 文件：https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
# -----------------------------------------------------------------------------

on:
  schedule:
    # 每 15 分鐘（UTC 的 :00、:15、:30、:45）。GitHub cron 以 UTC 為準，與台灣時差 +8。
    # 提醒：頻繁執行會多次發 Telegram、也可能頻繁 commit；測試完請改回每日一次。
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: |
          all = 與排程相同（抓取→commit→發送）。
          send = 只跑發送（用 repo 內 reports/，測試自動發送路徑）。
          fetch = 只抓取並 commit，不發 Telegram。
        type: choice
        options:
          - all
          - send
          - fetch
        default: all
  # 備援：若 Scheduled 在 GitHub 上始終不觸發，可用 Fine-grained PAT + 外部排程 POST dispatches
  repository_dispatch:
    types: [daily-run]

permissions:
  contents: write

# 全域設定台灣時區，讓所有步驟的日期都一致
env:
  TZ: Asia/Taipei
  PYTHONIOENCODING: utf-8

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # 避免每 15 分鐘多個 job 同時搶 Telegram / 同時 push；排隊執行較穩
    concurrency:
      group: corporate-bond-daily-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      - name: 🔎 觸發來源與時間（除錯用）
        run: |
          echo "github.event_name=${{ github.event_name }}"
          echo "UTC=$(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "TW =$(date '+%Y-%m-%d %H:%M:%S %Z')"

      - name: 🐍 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 安裝套件
        run: pip install -r requirements.txt

      # fetch 失敗仍繼續（用已 checkout 的 reports/complete_report_latest.txt 發送）
      - name: 📡 抓取並生成 complete_report
        id: fetch
        if: ${{ github.event_name == 'schedule' || github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'send') }}
        continue-on-error: true
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          TELEGRAM_CHAT_NAME: ${{ secrets.TELEGRAM_CHAT_NAME }}
        run: |
          echo "台灣時間：$(date '+%Y-%m-%d %H:%M:%S %Z')"
          python main.py fetch

      - name: 💾 儲存報告至 reports/
        if: ${{ github.event_name == 'schedule' || github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'send') }}
        run: |
          mkdir -p reports
          TODAY=$(date +%Y%m%d)
          REPORT="outputs/daily/complete_report_${TODAY}.txt"
          if [ -f "$REPORT" ]; then
            cp "$REPORT" "reports/complete_report_latest.txt"
            echo "✅ 已複製 ${REPORT} → reports/complete_report_latest.txt"
          else
            LATEST=$(ls -t outputs/daily/complete_report_*.txt 2>/dev/null | head -1)
            if [ -n "$LATEST" ]; then
              cp "$LATEST" "reports/complete_report_latest.txt"
              echo "ℹ️ 用最新報告：${LATEST}"
            else
              echo "::warning::本次未產生新報告，維持 repo 內既有 reports/（若 send 仍可能用舊檔）"
            fi
          fi

      - name: 📝 Commit 報告到 GitHub
        if: ${{ github.event_name == 'schedule' || github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'send') }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/
          if git diff --staged --quiet; then
            echo "無變更，略過 commit"
          else
            git commit -m "update: 每日報告 $(date '+%Y-%m-%d')"
            git push || echo "::warning::git push 失敗，仍繼續發送 Telegram"
          fi

      - name: ⏳ 發送前短暫緩衝
        if: ${{ github.event_name == 'schedule' || github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'fetch') }}
        run: sleep 5

      - name: 🔍 發送前檢查報告檔
        if: ${{ github.event_name == 'schedule' || github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'fetch') }}
        run: |
          ls -la reports/ 2>/dev/null || echo "（無 reports 目錄）"
          ls -la outputs/daily/ 2>/dev/null || echo "（無 outputs/daily）"
          if [ -f reports/complete_report_latest.txt ]; then
            echo "✅ reports/complete_report_latest.txt 存在，約 $(wc -c < reports/complete_report_latest.txt) bytes"
          else
            echo "::warning::缺少 reports/complete_report_latest.txt，send 將依 main.py 備援路徑找檔"
          fi

      - name: 📤 傳送轉換公司債公告至 Telegram Bot
        if: ${{ github.event_name == 'schedule' || github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'fetch') }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # send 內若觸發「無公告重試」會再跑 mode_fetch，需與 fetch 步驟相同憑證
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          TELEGRAM_CHAT_NAME: ${{ secrets.TELEGRAM_CHAT_NAME }}
        run: |
          echo "即將執行：python main.py send（台灣時間 $(date '+%H:%M:%S')）"
          python main.py send

      - name: 📦 上傳每日報告（保留 30 天）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-reports-${{ github.run_number }}
          path: outputs/daily/
          retention-days: 30
          if-no-files-found: ignore
