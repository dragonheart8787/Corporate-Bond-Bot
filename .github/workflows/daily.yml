name: 每日公司債自動抓取與 Telegram 通知

on:
  schedule:
    # 23:20 台灣時間（UTC+8）= UTC 15:20，週一至週五
    - cron: "20 15 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "執行模式（all=立即抓取並發送 / fetch=只抓取 / send=只發送）"
        required: false
        default: "all"

permissions:
  contents: write   # 需要寫入權限才能 commit 報告

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 安裝套件
        run: pip install -r requirements.txt

      # ── Step 1：23:20 抓取 + 格式化 ──
      - name: 📡 23:20 抓取並生成 complete_report
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          TELEGRAM_CHAT_NAME: ${{ secrets.TELEGRAM_CHAT_NAME }}
          PYTHONIOENCODING: utf-8
        run: python main.py fetch

      # ── Step 2：將報告存到 reports/ 供 Bot 讀取 ──
      - name: 💾 儲存報告至 reports/（供 /all 指令使用）
        run: |
          mkdir -p reports
          TODAY=$(date -u +%Y%m%d)
          if [ -f "outputs/daily/complete_report_${TODAY}.txt" ]; then
            cp "outputs/daily/complete_report_${TODAY}.txt" "reports/complete_report_latest.txt"
            echo "✅ 已複製 complete_report_${TODAY}.txt → reports/complete_report_latest.txt"
          else
            echo "⚠️ 找不到 outputs/daily/complete_report_${TODAY}.txt"
          fi

      - name: 📝 Commit 報告到 GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/
          git diff --staged --quiet && echo "無變更，略過 commit" || \
            git commit -m "update: 每日報告 $(date -u +%Y-%m-%d)" && git push

      # ── Step 3：等待至 23:30 ──
      - name: ⏳ 等待至 23:30 台灣時間
        if: ${{ github.event_name == 'schedule' }}
        run: |
          echo "抓取完成時間（UTC）: $(date -u)"
          echo "等待 600 秒（10 分鐘）..."
          sleep 600
          echo "發送時間（UTC）: $(date -u)"

      # ── Step 4：23:30 傳送轉換公司債公告 ──
      - name: 📤 23:30 傳送轉換公司債公告至 Telegram Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONIOENCODING: utf-8
        run: python main.py send

      # ── 備份 Artifact ──
      - name: 📦 上傳每日報告（Artifact，保留 30 天）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-reports-${{ github.run_number }}
          path: outputs/daily/
          retention-days: 30
