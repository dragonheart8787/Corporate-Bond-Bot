name: 每日公司債自動抓取與 Telegram 通知

on:
  schedule:
    # 台灣 22:35 = UTC 14:35（GitHub cron 僅支援 UTC）
    # 改為「此時開跑」一次完成抓取+發送，避免 22:00 開跑再 sleep 半小時（易失敗、log 上也不易看出）
    - cron: "35 14 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "執行模式（all=立即抓取並發送 / fetch=只抓取 / send=只發送）"
        required: false
        default: "all"

permissions:
  contents: write

# 全域設定台灣時區，讓所有步驟的日期都一致
env:
  TZ: Asia/Taipei
  PYTHONIOENCODING: utf-8

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 安裝套件
        run: pip install -r requirements.txt

      # fetch 失敗仍繼續（用已 checkout 的 reports/complete_report_latest.txt 發送）
      - name: 📡 抓取並生成 complete_report
        id: fetch
        continue-on-error: true
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          TELEGRAM_CHAT_NAME: ${{ secrets.TELEGRAM_CHAT_NAME }}
        run: |
          echo "台灣時間：$(date '+%Y-%m-%d %H:%M:%S %Z')"
          python main.py fetch

      - name: 💾 儲存報告至 reports/
        run: |
          mkdir -p reports
          TODAY=$(date +%Y%m%d)
          REPORT="outputs/daily/complete_report_${TODAY}.txt"
          if [ -f "$REPORT" ]; then
            cp "$REPORT" "reports/complete_report_latest.txt"
            echo "✅ 已複製 ${REPORT} → reports/complete_report_latest.txt"
          else
            LATEST=$(ls -t outputs/daily/complete_report_*.txt 2>/dev/null | head -1)
            if [ -n "$LATEST" ]; then
              cp "$LATEST" "reports/complete_report_latest.txt"
              echo "ℹ️ 用最新報告：${LATEST}"
            else
              echo "::warning::本次未產生新報告，維持 repo 內既有 reports/（若 send 仍可能用舊檔）"
            fi
          fi

      - name: 📝 Commit 報告到 GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/
          if git diff --staged --quiet; then
            echo "無變更，略過 commit"
          else
            git commit -m "update: 每日報告 $(date '+%Y-%m-%d')"
            git push || echo "::warning::git push 失敗，仍繼續發送 Telegram"
          fi

      - name: ⏳ 發送前短暫緩衝
        run: sleep 5

      - name: 📤 傳送轉換公司債公告至 Telegram Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "即將執行：python main.py send（台灣時間 $(date '+%H:%M:%S')）"
          python main.py send

      - name: 📦 上傳每日報告（保留 30 天）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-reports-${{ github.run_number }}
          path: outputs/daily/
          retention-days: 30
