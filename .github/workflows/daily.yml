name: 每日公司債自動抓取與 Telegram 通知

on:
  schedule:
    # 11:00 台灣時間（UTC+8）= UTC 03:00，每天（含六日）
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "執行模式（all=立即抓取並發送 / fetch=只抓取 / send=只發送）"
        required: false
        default: "all"

permissions:
  contents: write

# 全域設定台灣時區，讓所有步驟的日期都一致
env:
  TZ: Asia/Taipei
  PYTHONIOENCODING: utf-8

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 45     # 改為 45 分鐘（fetch 5 min + sleep 10 min + send 3 min，留足緩衝）

    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 安裝套件
        run: pip install -r requirements.txt

      # ── Step 1：11:00 抓取 + 格式化 ──
      - name: 📡 11:00 抓取並生成 complete_report
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          TELEGRAM_CHAT_NAME: ${{ secrets.TELEGRAM_CHAT_NAME }}
        run: |
          echo "台灣時間：$(date '+%Y-%m-%d %H:%M:%S')"
          python main.py fetch

      # ── Step 2：將報告存到 reports/ 供 Bot /all 指令讀取 ──
      - name: 💾 儲存報告至 reports/
        run: |
          mkdir -p reports
          # 用台灣時間取日期（全域 TZ=Asia/Taipei 已設定）
          TODAY=$(date +%Y%m%d)
          REPORT="outputs/daily/complete_report_${TODAY}.txt"
          if [ -f "$REPORT" ]; then
            cp "$REPORT" "reports/complete_report_latest.txt"
            echo "✅ 已複製 ${REPORT} → reports/complete_report_latest.txt"
          else
            # 找最新一份（保底）
            LATEST=$(ls -t outputs/daily/complete_report_*.txt 2>/dev/null | head -1)
            if [ -n "$LATEST" ]; then
              cp "$LATEST" "reports/complete_report_latest.txt"
              echo "ℹ️ 用最新報告：${LATEST}"
            else
              echo "⚠️ 找不到任何報告"
            fi
          fi

      - name: 📝 Commit 報告到 GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/
          git diff --staged --quiet && echo "無變更，略過 commit" || \
            (git commit -m "update: 每日報告 $(date '+%Y-%m-%d')" && git push)

      # ── Step 3：等待至 11:05（排程觸發才等待）──
      - name: ⏳ 等待至 11:05 台灣時間
        if: ${{ github.event_name == 'schedule' }}
        run: |
          echo "等待前時間：$(date '+%Y-%m-%d %H:%M:%S')"
          sleep 300
          echo "傳送時間：$(date '+%Y-%m-%d %H:%M:%S')"

      # ── Step 4：11:05 傳送轉換公司債公告 ──
      - name: 📤 11:05 傳送轉換公司債公告至 Telegram Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py send

      # ── 備份 Artifact ──
      - name: 📦 上傳每日報告（保留 30 天）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-reports-${{ github.run_number }}
          path: outputs/daily/
          retention-days: 30
