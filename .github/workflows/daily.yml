name: 每日公司債自動抓取與 Telegram 通知

on:
  schedule:
    # 23:20 台灣時間（UTC+8）= UTC 15:20，週一至週五
    - cron: "20 15 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "執行模式（all=立即抓取並發送 / fetch=只抓取 / send=只發送）"
        required: false
        default: "all"

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 安裝套件
        run: pip install -r requirements.txt

      # ── Step 1：23:20 執行 auto_telegram_daily.py（抓取 + 格式化）──
      - name: 📡 23:20 執行 auto_telegram_daily.py 抓取並生成 complete_report
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          TELEGRAM_CHAT_NAME: ${{ secrets.TELEGRAM_CHAT_NAME }}
          PYTHONIOENCODING: utf-8
        run: python main.py fetch

      # ── Step 2：等待至 10:00（排程時才等待，手動觸發跳過）──
      - name: ⏳ 等待至 23:30 台灣時間
        if: ${{ github.event_name == 'schedule' }}
        run: |
          echo "抓取完成時間（UTC）: $(date -u)"
          echo "等待 600 秒（10 分鐘）至 23:30 台灣時間..."
          sleep 600
          echo "發送時間（UTC）: $(date -u)"

      # ── Step 3：23:30 傳送 complete_report 至 Telegram Bot ──
      - name: 📤 23:30 傳送轉換公司債公告至 Telegram Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONIOENCODING: utf-8
        run: python main.py send

      # ── 備份報告 ──
      - name: 📦 上傳每日報告（Artifact，保留 30 天）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-reports-${{ github.run_number }}
          path: outputs/daily/
          retention-days: 30
